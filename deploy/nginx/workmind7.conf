# /etc/nginx/sites-available/workmind7.conf
# 说明：
# - 前端静态文件：/opt/workmind/www/frontend（本地打包后上传到这里）
# - 后端 API：Docker 暴露在 127.0.0.1:8026
# - SSE：关闭缓冲，避免流式输出被 Nginx 缓冲

server {
    listen 8022;
    # 没有域名时，直接用公网 IP 访问即可；这里用 _ 匹配任意 Host
    # 如果你有域名，把下一行改成：server_name example.com;
    server_name _;

    # 你现在的静态文件目录（本地打包后上传到这里）
    root /opt/workmind/www/frontend;
    index index.html;

    # 上传最大体积（知识库上传默认最大 10MB；这里放宽到 20MB）
    client_max_body_size 20m;

    # ── 前端 SPA 路由 ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 通用 API 反代 ───────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8026;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 普通请求超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── SSE 流式接口（关闭缓冲）───────────────────────────────
    # 覆盖以下接口：
    # - /api/chat/stream
    # - /api/knowledge/query/stream
    # - /api/erp/submit/stream
    # - /api/workflow/start/stream
    # - /api/workflow/resume/stream
    # - /api/prompt/test/stream
    # - /api/agent/run
    location ~* ^/api/(chat/stream|knowledge/query/stream|erp/submit/stream|workflow/(start|resume)/stream|prompt/test/stream|agent/run)$ {
        proxy_pass http://127.0.0.1:8026;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置：禁止缓冲与缓存
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;

        # SSE 往往需要更长读超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 防止某些情况下 gzip 导致的缓冲
        gzip off;
    }
}
