# docker-compose.yml
# 一键启动所有服务：后端 + 向量数据库
# 使用命令：docker-compose up -d

version: '3.9'

services:
  # ── 后端服务 ────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: workmind-server:latest
    container_name: workmind-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8026:8026"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=8026
      - CHROMA_URL=http://chroma:8000
    depends_on:
      chroma:
        condition: service_started
    volumes:
      - ./server/uploads:/app/uploads   # 上传文件持久化
    networks:
      - workmind-net

  # ── Chroma 向量数据库（RAG 模块用）────────────────────────
  chroma:
    # 如果服务器拉取 Docker Hub 很慢/受限，可在本地 docker save 后上传到服务器再 docker load
    image: chromadb/chroma:latest
    container_name: workmind-chroma
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - workmind-net

volumes:
  chroma-data:

networks:
  workmind-net:
    driver: bridge
